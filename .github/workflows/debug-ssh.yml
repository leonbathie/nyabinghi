name: Debug SSH

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  debug:
    name: Debug SSH auth
    runs-on: ubuntu-latest
    steps:
      - name: Write SSH key (sanitize CRLF)
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_debug
          chmod 600 ~/.ssh/id_debug
          echo "Saved debug key to ~/.ssh/id_debug (CR removed)"

      - name: Derive public key and show fingerprint
        run: |
          set -e
          if ssh-keygen -y -f ~/.ssh/id_debug > ~/.ssh/id_debug.pub 2>/dev/null; then
            echo "Derived public key saved to ~/.ssh/id_debug.pub"
            ssh-keygen -lf ~/.ssh/id_debug.pub || true
          else
            echo "Failed to derive public key from private key" >&2
            exit 0
          fi

      - name: Prepare target and show lengths
        run: |
          USER_RAW="${{ secrets.VPS_USER }}"
          HOST_RAW="${{ secrets.VPS_HOST }}"
          USER=$(printf '%s' "$USER_RAW" | tr -d '\r\n')
          HOST=$(printf '%s' "$HOST_RAW" | tr -d '\r\n')
          TARGET="$USER@$HOST"
          echo "Target length: $(printf '%s' "$TARGET" | wc -c) bytes"
          echo "User length: $(printf '%s' "$USER" | wc -c) bytes"
          echo "Host length: $(printf '%s' "$HOST" | wc -c) bytes"
          echo "Running ssh to masked target"

      - name: Test SSH auth (verbose)
        run: |
          USER=$(printf '%s' "${{ secrets.VPS_USER }}" | tr -d '\r\n')
          HOST=$(printf '%s' "${{ secrets.VPS_HOST }}" | tr -d '\r\n')
          TARGET="$USER@$HOST"
          ssh -i ~/.ssh/id_debug -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -vvv "$TARGET" echo "SSH_OK"
