name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
          
      - name: Add host key to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 173.249.2.195 >> ~/.ssh/known_hosts

      - name: SSH and pull latest
        run: |
          ssh -o StrictHostKeyChecking=no ousmane@173.249.2.195 "set -e && cd /var/www/nyabinghi && git fetch --all && git reset --hard origin/main && echo '✓ Deployed commit \$(git rev-parse --short HEAD) at \$(date)'"
