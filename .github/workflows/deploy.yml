name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    steps:
      - name: SSH and pull latest
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /var/www/nyabinghi
            git fetch --all
            git reset --hard origin/main
            echo "✓ Deployed commit $(git rev-parse --short HEAD) at $(date '+%Y-%m-%d %H:%M:%S')"
