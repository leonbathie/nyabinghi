name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add host key to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 173.249.2.195 >> ~/.ssh/known_hosts

      - name: SSH and pull latest
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          ssh -o StrictHostKeyChecking=no ousmane@173.249.2.195 << EOF
            set -e
            cd /var/www/nyabinghi
            git fetch --all
            git reset --hard origin/main
            
            # On écrit la configuration avec base64 pour éviter tous les problèmes de syntaxe
            echo '' | base64 -d > /tmp/nyabinghi.conf
            
            # Envoi du mot de passe GitHub à sudo pour appliquer la conf sans bloquer
            echo "${VPS_PASSWORD}" | sudo -S mv /tmp/nyabinghi.conf /etc/nginx/sites-available/nyabinghi
            echo "${VPS_PASSWORD}" | sudo -S ln -sf /etc/nginx/sites-available/nyabinghi /etc/nginx/sites-enabled/
            echo "${VPS_PASSWORD}" | sudo -S nginx -t
            echo "${VPS_PASSWORD}" | sudo -S systemctl reload nginx
            echo "${VPS_PASSWORD}" | sudo -S ufw allow 8081/tcp
            
            echo "✓ Deploiement MVC Nginx et Github (Port 8081) reussi !"
          EOF
